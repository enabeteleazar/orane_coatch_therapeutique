kind = "web"
previewPath = "/"
title = "Équilibre Coaching"
version = "1.0.0"
id = "artifacts/equilibre-coaching"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23195

[services.development]
run = "pnpm --filter @workspace/equilibre-coaching run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/equilibre-coaching", "run", "build" ]
publicDir = "artifacts/equilibre-coaching/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23195"
BASE_PATH = "/"
